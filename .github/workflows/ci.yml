---
# RISC OS CI build using local 32-bit and 64-bit toolchains in the container.

name: RISC OS

# Controls when the action will run. Triggers the workflow on:
#   * push on any branch.
#   * tag creation for tags beginning with a 'v'
#   * pull requests
on:
  push:
    branches: ["*"]
    tags: ["v*"]
  pull_request:
    types: [opened, reopened, synchronize]
    branches: ["*"]

jobs:
  build-riscos:
    runs-on: ubuntu-latest
    container:
      image: gerph/riscos-build:latest-64bit
    outputs:
      version: ${{ steps.version.outputs.version }}
      leafname: ${{ steps.version.outputs.leafname }}

    steps:
      - uses: actions/checkout@v7

      - name: RISC OS 64 build
        run: |
          riscos-amu BUILD64=1
          riscos-amu BUILD64=1 export

      - name: RISC OS 32 build
        run: |
          riscos-amu
          riscos-amu export

      - name: Create archive of exports
        run: |
          mkdir -p Artifacts/Lib
          cp -R "$BUILD_DIR/Export/Lib/GContext" Artifacts/Lib/GContext
          cd Artifacts
          riscos-zip ../GContext.zip *

      - name: Give the output a versioned name
        id: version
        run: |
          if [[ -f VersionNum ]] ; then
              version=$(sed '/MajorVersion / ! d ; s/.*MajorVersion *"\(.*\)"/\1/' VersionNum)
          else
              version=$(git rev-parse --short HEAD)
          fi
          leafname="GContext-$version.zip"
          mv GContext.zip "$leafname"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "leafname=$leafname" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: RISCOS-build
          path: ${{ steps.version.outputs.leafname }}

  release:
    needs: build-riscos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download built RISC OS binary
        uses: actions/download-artifact@v8
        with:
          name: RISCOS-build

      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          prerelease: false
          draft: true
          artifacts: "${{ needs.build-riscos.outputs.leafname }}"
          artifactContentType: application/zip
